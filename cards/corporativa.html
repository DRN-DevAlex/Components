<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>card corporativa</title>
    <!-- vinculos de estilos -->
     <link rel="stylesheet" href="./corporativa.css">
</head>
<body>
    <section class="corporate-section">
    <div class="corporate-card">
        <div class="card-index">01</div>
        
        <div class="card-main">
            <span class="card-category">Consultoría Estratégica</span>
            <h3 class="card-title">Transformación <br>Empresarial</h3>
            <p class="card-description">
                Elevamos el potencial de su organización mediante análisis de datos avanzados y reestructuración de procesos críticos.
            </p>
            
            <div class="card-footer">
                <a href="#" class="corporate-link">
                    Explorar Servicio
                    <svg class="arrow-icon" viewBox="0 0 24 24"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
                </a>
            </div>
        </div>
        
        <div class="gold-accent"></div>
    </div>
</section>
</body>
</html>
