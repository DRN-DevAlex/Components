<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Basico</title>
    <!-- agregando estilos  -->
     <link rel="stylesheet" href="./basico.css">
</head>
<body>
    <!-- creacion de formulario basico -->
     <section class="contact-section">
    <div class="contact-container">
        <h2>Ponte en contacto</h2>
        <p>Envíame un mensaje y te responderé lo antes posible.</p>

        <form class="contact-form">
            <div class="form-group">
                <label for="name">Nombre Completo</label>
                <input type="text" id="name" placeholder="Ej. Alex DeRN" required>
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="alex@ejemplo.com" required>
            </div>

            <div class="form-group">
                <label for="message">Mensaje</label>
                <textarea id="message" rows="5" placeholder="¿En qué puedo ayudarte?" required></textarea>
            </div>

            <button type="submit" class="btn-send">Enviar Mensaje</button>
        </form>
    </div>
</section>
</body>
</html>
