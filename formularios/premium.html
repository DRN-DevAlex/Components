<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Premium</title>
    <!-- vinculo de estilos -->
    <link rel="stylesheet" href="./premium.css">
</head>
<body>
    <section class="ultra-premium-contact">
    <div class="glass-background"></div> <div class="luxury-form-wrapper">
        <div class="form-header">
            <span class="luxury-tag">Private Concierge</span>
            <h2 class="luxury-title">Solicitar una <span>Consultoría</span></h2>
            <div class="luxury-divider"></div>
        </div>

        <form class="luxury-form">
            <div class="input-row">
                <div class="luxury-input-group">
                    <input type="text" id="name" required placeholder=" ">
                    <label for="name">Nombre y Apellidos</label>
                    <div class="line-gold"></div>
                </div>
                <div class="luxury-input-group">
                    <input type="email" id="email" required placeholder=" ">
                    <label for="email">Dirección de Email</label>
                    <div class="line-gold"></div>
                </div>
            </div>

            <div class="luxury-input-group full-width">
                <select id="service" required>
                    <option value="" disabled selected>Seleccione el servicio de interés</option>
                    <option value="digital">Diseño Digital de Lujo</option>
                    <option value="brand">Identidad de Marca</option>
                    <option value="dev">Desarrollo Web Pro</option>
                </select>
                <div class="line-gold"></div>
            </div>

            <div class="luxury-input-group full-width">
                <textarea id="message" required placeholder=" "></textarea>
                <label for="message">Cuéntenos sobre su visión...</label>
                <div class="line-gold"></div>
            </div>

            <div class="form-footer">
                <button type="submit" class="btn-luxury">
                    <span class="btn-text">Enviar Solicitud</span>
                    <span class="btn-icon">⚜</span>
                </button>
            </div>
        </form>
    </div>
</section>
</body>
</html>
