<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario mas pro</title>
    <!-- vinculo de enlaces -->
     <link rel="stylesheet" href="./pro.css">
</head>
<body>
    <section class="pro-contact">
    <div class="pro-container">
        <div class="contact-info">
            <span class="info-tag">Contacto</span>
            <h2>Hablemos de tu <br><span>próximo proyecto</span></h2>
            <p>¿Tienes una idea en mente? Estamos aquí para ayudarte a construirla desde cero.</p>
            
            <div class="info-details">
                <div class="info-item">
                    <strong>Email:</strong>
                    <span>hola@tuagencia.com</span>
                </div>
                <div class="info-item">
                    <strong>Ubicación:</strong>
                    <span>Sonsonate, El Salvador</span>
                </div>
            </div>
        </div>

        <div class="contact-card">
            <form class="form-grid">
                <div class="input-box">
                    <input type="text" required>
                    <label>Nombre</label>
                </div>
                <div class="input-box">
                    <input type="email" required>
                    <label>Email</label>
                </div>
                <div class="input-box full-width">
                    <input type="text" required>
                    <label>Asunto</label>
                </div>
                <div class="input-box full-width">
                    <textarea required></textarea>
                    <label>Escribe tu mensaje...</label>
                </div>
                <button type="submit" class="btn-pro">
                    Enviar Propuesta
                </button>
            </form>
        </div>
    </div>
</section>
</body>
</html>
